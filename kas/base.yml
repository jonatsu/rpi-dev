# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/master/kas/schema-kas.json

# KAS documentation
# https://kas.readthedocs.io/en/5.2/userguide/project-configuration.html
#
# Some helpful references:
#
# https://github.com/bootlin/simplest-yocto-setup/blob/2ced1e749dfdf8e9438718deb84055b211ab5620/.config.yaml
# https://github.com/texierp/kas-files/tree/8a267ec7217db79859e7ec45d449b6cb30345974
# https://github.com/unitexe/meta-unit-kas/tree/e00a3d23e8bea45f38199b489f2bd5ba063e73ae
header:
  version: 20
  includes:
    - kas/templates/bblayers.conf.yml
    - kas/templates/local.conf.yml
    - kas/vendor/oe-yocto.yml
    - kas/vendor/lts-mixins.yml
    - kas/feature/systemd.yml
    - kas/fragments/build-history.yml
    - kas/fragments/build-info.yml
    - kas/fragments/build-statistics.yml
    - kas/fragments/diskmon.yml
    - kas/fragments/resource-limits.yml

build_system: openembedded
distro: nodistro
machine: unset
target:
  - core-image-base

env:
  SDKMACHINE: "x86_64"
  # BB_NUMBER_THREADS: "8"
  # PARALLEL_MAKE: "-j8"
  # KAS_WORK_DIR: "${KAS_WORK_DIR:-$(pwd)}"

local_conf_header:
  00_standard: |
    # ---------------------------------------------------------------------------
    # Shared-state (build/sstate-cache) mirror
    # ---------------------------------------------------------------------------
    # SSTATE_MIRRORS tells BitBake where to look for prebuilt sstate objects
    # before re-running tasks locally.  The value is a space-separated list of
    # "file://.* <mirror-url>/PATH" pairs.  The literal token "PATH" is
    # substituted at runtime with the relative sstate object path (e.g.
    # "universal/ab/ab12cd…_do_compile.tar.zst"), so it must be kept verbatim.
    #
    # Multiple mirrors can be stacked by appending additional pairs:
    #
    #   SSTATE_MIRRORS:append = "file://.* file:///mnt/local-sstate/PATH"
    #
    # Set BB_HASHSERVE_UPSTREAM to the hash equivalence server that generated
    # the remote sstate so that signature matching works correctly.
    #
    # See:
    # https://docs.yoctoproject.org/dev/dev-manual/hashequivserver.html
    # https://docs.yoctoproject.org/bitbake/2.8/bitbake-user-manual/bitbake-user-manual-ref-variables.html#term-BB_HASHSERVE_UPSTREAM
    # https://www.thegoodpenguin.co.uk/blog/improving-yocto-build-time/

    #BB_SIGNATURE_HANDLER = "OEEquivHash"
    #BB_HASHSERVE = "wss://hashserv.yoctoproject.org/ws"
    #SSTATE_MIRRORS:append = " file://.* https://sstate.yoctoproject.org/all/PATH;downloadfilename=PATH"
    #BB_HASHSERVE = "auto"
    #BB_HASHSERVE_UPSTREAM = "hashserv.yoctoproject.org:8686"
    #BB_HASHSERVE_UPSTREAM = "typhoon.yocto.io:8687"
    #BB_HASHSERVE_UPSTREAM = "wss://hashserv.yoctoproject.org/ws"

    # ---------------------------------------------------------------------------
    # Downloads (build/downloads) mirroring
    # ---------------------------------------------------------------------------
    # See: https://docs.yoctoproject.org/scarthgap/dev-manual/efficiently-fetching-sources.html#setting-up-effective-mirrors
    # Then set SOURCE_MIRROR_URL to the base URL served by your mirror, e.g.:
    #
    #   SOURCE_MIRROR_URL = "http://mirror.example.com/sources/"
    #   SOURCE_MIRROR_URL = "file:///mnt/mirror/yocto/sources/"
    # URL of the local source mirror.
    # Adjust this value for your environment before enabling this file.
    # SOURCE_MIRROR_URL ?= "file:///mnt/shared/build/downloads/"

    # Activate own-mirrors.bbclass — prepends SOURCE_MIRROR_URL to PREMIRRORS for
    # all fetcher protocols (cvs, svn, git, gitsm, hg, bzr, p4, osc, http/https,
    # ftp, npm, s3, crate, gs).
    # INHERIT += "own-mirrors"

    # Set BB_FETCH_PREMIRRORONLY = "1" to prevent BitBake from falling back to
    # upstream servers when a source is not found in the mirror.
    # Useful for air-gapped or reproducible offline build environments.
    # BB_FETCH_PREMIRRORONLY = "1"

    # TODO
    #BB_GENERATE_MIRROR_TARBALLS ?= "1"

    # Tell Git to only download the latest snapshot, not the entire 20-year history.
    # https://docs.yoctoproject.org/bitbake/2.8/bitbake-user-manual/bitbake-user-manual-ref-variables.html#term-BB_GIT_SHALLOW
    BB_GIT_SHALLOW ?= "1"
    #BB_GIT_SHALLOW_DEPTH ?= "3"

  01_common-config: |
    # Build IPK packages as they are the simplest and smallest size, also fastest to build.
    # https://docs.yoctoproject.org/scarthgap/ref-manual/classes.html#ref-classes-package
    PACKAGE_CLASSES ?= "package_ipk"

    # Use uutils-coreutils as it has more permissive license than coreutils.
    #PREFERRED_PROVIDER_coreutils = "uutils-coreutils"

    # Add some common tools.
    IMAGE_INSTALL:append = " nano"
