# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/master/kas/schema-kas.json
header:
  version: 20

local_conf_header:
  00_enable-build-statistics: |
    # ---------------------------------------------------------------------------
    # Enable build statistics to track build performance and identify bottlenecks.
    # ---------------------------------------------------------------------------
    # Documentation:
    # https://docs.yoctoproject.org/scarthgap/ref-manual/classes.html#buildstats
    # https://docs.yoctoproject.org/scarthgap/ref-manual/classes.html#buildstats-summary
    USER_CLASSES:append = " buildstats buildstats-summary"

