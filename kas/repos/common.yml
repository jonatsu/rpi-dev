#
# KAS documentation
# https://kas.readthedocs.io/en/5.2/userguide/project-configuration.html
#
# Some helpful references:
#
# https://github.com/bootlin/simplest-yocto-setup/blob/2ced1e749dfdf8e9438718deb84055b211ab5620/.config.yaml
# https://github.com/texierp/kas-files/tree/8a267ec7217db79859e7ec45d449b6cb30345974
# https://github.com/unitexe/meta-unit-kas/tree/e00a3d23e8bea45f38199b489f2bd5ba063e73ae
header:
  version: 14

repos:
  meta-rpi-dev:
    #path: meta-rpi-dev
    layers:
      meta-rpi-dev:

  bitbake:
    url: https://git.openembedded.org/bitbake
    # tag: yocto-5.0.17
    branch: "2.8"
    commit: d3b4c352dd33fca90cd31649eda054b884478739
    path: layers/bitbake
    layers:
      .: disabled

  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    # Need to use later commit to fix 'glibc' and others compilation bugs.
    # https://git.openembedded.org/openembedded-core/commit/?h=scarthgap&id=689bd1811c2300263a8a86ba3b46bbc6b1622323
    # tag: yocto-5.0.17
    branch: scarthgap
    commit: ece80784b493c8b7493478fa2ba0dc1d6d80aa79
    path: layers/openembedded-core
    layers:
      meta:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    # yocto-5.0.17
    branch: scarthgap
    commit: ae7dfb12245c7f9b9a353499e2688015bd4e6413
    path: layers/meta-openembedded
    layers:
      meta-oe:
      meta-perl:
      meta-python:
      meta-networking:
      meta-webserver:
      meta-filesystems:
      meta-gnome:
      meta-xfce:

  meta-yocto:
    url: https://git.yoctoproject.org/git/meta-yocto
    # tag: yocto-5.0.17
    branch: scarthgap
    commit: c7c38663a1cafb1fa8593c0b246811e51d3bbe20
    path: layers/meta-yocto
    layers:
      meta-poky:
      meta-yocto-bsp:

  yocto-docs:
    url: https://git.yoctoproject.org/git/yocto-docs
    # tag: yocto-5.0.17
    branch: scarthgap
    commit: aa7226705451e6c1ef964d49963bbed29b267c27
    path: layers/yocto-docs
    layers:
      .: disabled
