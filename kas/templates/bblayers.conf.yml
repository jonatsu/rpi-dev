# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/master/kas/schema-kas.json

header:
  version: 20

# Documentation:
# https://git.openembedded.org/openembedded-core/tree/meta/conf/templates/default/bblayers.conf.sample?h=scarthgap
# https://docs.yoctoproject.org/scarthgap/dev-manual/layers.html#enabling-your-layer
bblayers_conf_header:
  00_oe-layersetup-bblayers-conf-template: |
    # This template file was created by taking the 'oe-core/meta/conf/bblayers.conf.sample'
    # file and removing the BBLAYERS section at the end.

    # LAYER_CONF_VERSION and POKY_BBLAYERS_CONF_VERSION is increased each
    # time 'build/conf/bblayers.conf' changes in an incompatible manner.
    LCONF_VERSION = "7"
    POKY_BBLAYERS_CONF_VERSION = "2"

    BBPATH = "${TOPDIR}"
    BBFILES ?= ""
