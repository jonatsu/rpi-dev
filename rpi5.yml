# https://github.com/gaknoid/project-os/blob/ea1a1da03e329e2dbdbbb0df23e189bd1ba3ec7f/layers/meta-project/conf/distro/include/default.inc
header:
  version: 14
  includes:
    - kas/kas-base.yml
    - kas/kas-dev.yml
    - kas/presets/buildstats.yml
    - kas/presets/buildhistory.yml
    - kas/presets/buildinfo.yml
    - kas/machines/raspberrypi5.yml

distro: poky
target: 
  - core-image-base

#env:
#  BB_NUMBER_THREADS: "8"
#  PARALLEL_MAKE: "-j8"

local_conf_header:
  00_custom-config: |
    DL_DIR = "/home/jonatsu/dev/yocto/.cache/bitbake-downloads"
    SSTATE_DIR = "/home/jonatsu/dev/yocto/.cache/bitbake-sstate"
    
    # IPK has smallest package size.
    # https://docs.yoctoproject.org/scarthgap/ref-manual/classes.html#ref-classes-package
    PACKAGE_CLASSES = "package_ipk"

    # Use 'systemd' as the init manager.
    # https://docs.yoctoproject.org/scarthgap/dev-manual/init-manager.html
    # https://docs.yoctoproject.org/scarthgap/ref-manual/variables.html#term-DISTRO_FEATURES_BACKFILL_CONSIDERED
    INIT_MANAGER = "systemd"
    VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
    VIRTUAL-RUNTIME_syslog = ""
    VIRTUAL-RUNTIME_base-utils-syslog = ""

    # Suppress the sysvinit backfill warning since we intentionally replaced it.
    DISTRO_FEATURES_BACKFILL_CONSIDERED += "sysvinit"

    # 'udev' device manager provided by 'systemd'.
    # https://docs.yoctoproject.org/scarthgap/dev-manual/device-manager.html
    VIRTUAL-RUNTIME_dev_manager = "systemd"

    # Additional info to save into buildinfo (/etc/buildinfo).
    # See: https://docs.yoctoproject.org/scarthgap/ref-manual/variables.html#term-IMAGE_BUILDINFO_VARS
    IMAGE_BUILDINFO_VARS:append = " DATETIME DISTRO_NAME IMAGE_BASENAME MACHINE TUNE_PKGARCH"
    IMAGE_BUILDINFO_VARS:append = " MACHINE_FEATURES DISTRO_FEATURES COMMON_FEATURES IMAGE_FEATURES"
    IMAGE_BUILDINFO_VARS:append = " TUNE_FEATURES TARGET_FPU"


    # Extra image features enabled for development/debug builds:
    #   debug-tweaks          - applies a collection of insecure debug shortcuts
    #   allow-empty-password  - allow accounts with no password set
    #   allow-root-login      - allow root SSH/console login
    #   empty-root-password   - set the root password to empty
    #   serial-autologin-root - auto-login root on the serial console
    #   ssh-server-openssh    - install OpenSSH server
    #   ssh-server-dropbear   - install Dropbear SSH server
    #   package-management    - include the package manager and package database
    #   hwcodecs              - install machine-specific hardware video codec support
    #   nfs-server            - include NFS server kernel modules and utilities
    #   x11                   - include X11 runtime client libraries
    #   x11-base              - include a minimal X11 server
    EXTRA_IMAGE_FEATURES:append = " empty-root-password allow-empty-password allow-root-login"

